
default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  host: localhost
  password: postgres
  pool: 20

development:
  <<: *default
  database: payment_demo_development

test:
  <<: *default
  database: payment_demo_test

production:
  primary: &primary_production
    <<: *default
    database: payment_demo_production
    username: payment_demo
    password: <%= ENV["PAYMENT_DEMO_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: payment_demo_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: payment_demo_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: payment_demo_production_cable
    migrations_paths: db/cable_migrate
